###############################################################################
#
# IceWarp Configuration
#
###############################################################################

IW_HOME="/opt/icewarp"

IW_TOOL="${IW_HOME}/tool.sh"

IW_CONFIG="${IW_HOME}/config"

IW_MAIL="${IW_HOME}/mail"

IW_LOGS="${IW_HOME}/logs"

IW_TEMP="${IW_HOME}/temp"

IW_ARCHIVE="${IW_HOME}/archive"

IW_BACKUP="${IW_HOME}/backup"

# Used by collectors/icewarp/certificate.sh - adjust to the certificate
# actually configured on this server (tool.sh has no direct "give me the
# active cert path" property, so this must be set manually per install).
IW_SSL_CERT="${IW_HOME}/ssl/certificate.pem"

# Used by collectors/icewarp/antivirus.sh and antispam.sh to infer "last
# update" via file mtime when no tool.sh property is available.
IW_AV_DEFS_PATH="${IW_HOME}/antivirus"
IW_AS_DEFS_PATH="${IW_HOME}/antispam"

# DNS resolver(s) used by the PTR/SPF/DKIM/DMARC collectors. Leave empty to
# use the system resolver.
DNS_RESOLVER=""

# Public hostname/IP this server sends mail as - used for PTR + SPF/DKIM
# domain checks. Must be set per install.
MAIL_HOSTNAME=""
MAIL_PUBLIC_IP=""
